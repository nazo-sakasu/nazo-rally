<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>なぞときスタンプラリー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Nunito:wght@900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;}
body{font-family:'Noto Sans JP',sans-serif;background:#f5f0e8;color:#2d1a00;overflow-x:hidden;min-height:100vh;padding-bottom:70px;}
:root{
  --or:#f97316; --ordk:#c2410c; --orlt:#fff7ed; --orbd:#fed7aa;
  --yw:#f59e0b; --ywlt:#fef9c3;
  --gn:#16a34a; --gnlt:#dcfce7;
  --pu:#7c3aed; --pult:#f5f3ff;
  --ink:#2d1a00; --muted:#92400e;
  --card:#fff; --bd:#e8d5b0; --bd2:#f5e8d0;
  --bg:#f5f0e8;
}

/* ── ヘッダー ── */
.hdr{background:linear-gradient(135deg,#ea580c,#f97316 45%,#f59e0b);position:relative;overflow:hidden;}
.hdr::before{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 80% 20%,rgba(255,255,255,.15),transparent 50%),
             radial-gradient(circle at 20% 80%,rgba(255,255,255,.1),transparent 50%);}
.hero-img{width:100%;max-height:200px;object-fit:cover;display:none;}
.hdr-inner{max-width:540px;margin:0 auto;padding:16px 16px 14px;display:flex;align-items:center;gap:12px;position:relative;z-index:1;}
.hdr-logo{width:50px;height:50px;border-radius:14px;flex-shrink:0;background:rgba(255,255,255,.28);border:2px solid rgba(255,255,255,.55);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:22px;}
.hdr-logo img{width:100%;height:100%;object-fit:cover;}
.hdr-title{font-size:18px;font-weight:900;color:#fff;line-height:1.25;text-shadow:0 1px 6px rgba(0,0,0,.18);}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.88);margin-top:2px;}

/* ── ニックネームバー ── */
.nbar{background:var(--card);border-bottom:2px solid var(--bd);padding:9px 14px;}
.nbar-inner{max-width:540px;margin:0 auto;}
.nform{display:flex;gap:8px;}
.nform input{flex:1;border:2px solid var(--bd);border-radius:99px;padding:8px 15px;font-size:14px;outline:none;font-family:'Noto Sans JP',sans-serif;background:var(--orlt);}
.nform input:focus{border-color:var(--or);}
.nform button{background:var(--or);color:#fff;border:none;border-radius:99px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.nform button:hover{background:var(--ordk);}
.nshow{display:none;align-items:center;gap:10px;}
.nshow.on{display:flex;}
.navatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--or),var(--yw));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;}
.nname{font-size:14px;font-weight:700;}
.nsub{font-size:11px;color:var(--muted);}
.nedit{margin-left:auto;font-size:11px;color:var(--muted);background:none;border:1px solid var(--bd);border-radius:99px;padding:3px 11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}

/* ── コンテンツ共通 ── */
.tab-content{display:none;max-width:540px;margin:0 auto;padding:14px 12px 20px;}
.tab-content.active{display:block;}

/* ══ タブ①：ホーム ══ */

/* スタンプボード */
.sboard{background:var(--card);border-radius:18px;border:2.5px solid var(--or);margin-bottom:14px;overflow:hidden;box-shadow:0 4px 20px rgba(249,115,22,.14),0 0 0 4px rgba(249,115,22,.06);}
.sstripe{height:5px;background:repeating-linear-gradient(90deg,var(--or) 0,var(--or) 16px,var(--yw) 16px,var(--yw) 32px,#fb923c 32px,#fb923c 48px);}
.sboard-head{padding:12px 16px 0;display:flex;align-items:center;justify-content:space-between;}
.sboard-title{font-size:14px;font-weight:900;color:var(--ordk);}
.scount{font-family:'Nunito',sans-serif;font-size:32px;font-weight:900;color:var(--or);line-height:1;}
.scount small{font-size:13px;color:#bbb;margin-left:2px;}
.sgrid-wrap{padding:10px 12px 12px;}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.scell{position:relative;width:100%;padding-top:100%;border-radius:12px;background:#fdf4e8;border:2.5px dashed #e0b87a;overflow:hidden;}
.scell.on{background:linear-gradient(145deg,#fff7ed,#ffedd5);border:2.5px solid var(--or);box-shadow:0 4px 14px rgba(249,115,22,.2);animation:spop .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes spop{0%{transform:scale(.45) rotate(-12deg);opacity:0;}65%{transform:scale(1.08) rotate(2deg);}100%{transform:scale(1) rotate(0);opacity:1;}}
.scell.on::after{content:'';position:absolute;inset:4px;border-radius:8px;border:1.5px dashed rgba(249,115,22,.22);pointer-events:none;}
.scell-in{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.sno{position:absolute;top:4px;left:6px;font-size:9px;font-weight:700;color:#c49060;opacity:.65;font-family:'Nunito',sans-serif;}
.sempty{font-size:22px;opacity:.2;}
.semoji{font-size:30px;line-height:1;margin-bottom:3px;}
.simg{width:56%;aspect-ratio:1;border-radius:6px;overflow:hidden;margin-bottom:3px;}
.simg img{width:100%;height:100%;object-fit:cover;}
.slbl{font-size:8px;font-weight:700;color:var(--ordk);text-align:center;padding:0 3px;line-height:1.2;}

/* あとN問バナー */
.rbanner{margin-top:2px;margin-bottom:8px;border-radius:10px;padding:9px 13px;display:flex;align-items:center;gap:9px;transition:all .3s;}
.rbanner.many{background:var(--orlt);color:var(--ordk);border:1.5px solid var(--orbd);}
.rbanner.few{background:var(--ywlt);color:#78350f;border:1.5px solid #fde68a;animation:glow .9s ease-in-out infinite alternate;}
.rbanner.last{background:var(--gnlt);color:#14532d;border:1.5px solid #86efac;animation:glow .9s ease-in-out infinite alternate;}
.rbanner.done{background:linear-gradient(135deg,var(--or),var(--yw));color:#fff;border:none;}
@keyframes glow{from{box-shadow:0 0 0 0 rgba(249,115,22,.3);}to{box-shadow:0 0 0 6px rgba(249,115,22,0);}}
.rbanner-icon{font-size:20px;flex-shrink:0;}
.rbanner-main{font-size:13px;font-weight:900;}
.rbanner-sub{font-size:10px;opacity:.75;margin-top:1px;}
.prog{height:7px;background:var(--bd2);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--or),var(--yw));border-radius:99px;transition:width .8s ease;}

/* みんなの正解状況 */
.qbox{background:var(--card);border-radius:16px;border:1.5px solid var(--bd);padding:13px 15px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.qbox-head{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px;}
.qrow{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
.qrow:last-child{margin-bottom:0;}
.qlbl{width:38px;flex-shrink:0;font-size:11px;font-weight:700;color:#888;}
.qbar{position:relative;flex:1;height:9px;border-radius:99px;background:var(--bd2);overflow:hidden;}
.qfill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--or),var(--yw));border-radius:99px;transition:width .7s ease;}
.qnum{width:54px;text-align:right;font-size:10px;font-weight:700;color:#999;white-space:nowrap;}

/* ══ タブ②：対象スポット ══ */

/* ★ 2列グリッドカード ★ */
.spots-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.spot-card{background:var(--card);border-radius:14px;overflow:hidden;border:2px solid var(--bd);box-shadow:0 2px 8px rgba(0,0,0,.06);cursor:pointer;transition:all .2s;position:relative;}
.spot-card:hover{border-color:var(--or);transform:translateY(-2px);box-shadow:0 6px 20px rgba(249,115,22,.14);}
.spot-card.solved{border-color:var(--gn);}

/* サムネイル */
.spot-thumb{width:100%;aspect-ratio:4/3;background:var(--bd2);display:flex;align-items:center;justify-content:center;font-size:40px;overflow:hidden;position:relative;}
.spot-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
/* 解決済みオーバーレイ */
.spot-solved-overlay{display:none;position:absolute;inset:0;background:rgba(22,163,74,.55);align-items:center;justify-content:center;}
.spot-card.solved .spot-solved-overlay{display:flex;}
.spot-solved-mark{font-size:44px;}
/* 番号バッジ */
.spot-no-badge{position:absolute;top:7px;left:7px;background:var(--or);color:#fff;font-size:11px;font-weight:900;padding:3px 9px;border-radius:99px;font-family:'Nunito',sans-serif;box-shadow:0 2px 6px rgba(0,0,0,.2);}
.spot-card.solved .spot-no-badge{background:var(--gn);}

/* カード情報 */
.spot-info{padding:9px 10px 10px;}
.spot-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:3px;line-height:1.3;}
.spot-desc{font-size:10px;color:#999;line-height:1.4;margin-bottom:4px;}
.spot-status{display:inline-block;font-size:10px;font-weight:700;padding:2px 9px;border-radius:99px;}
.spot-status.todo{background:var(--orlt);color:var(--ordk);border:1px solid var(--orbd);}
.spot-status.done{background:var(--gnlt);color:#15803d;border:1px solid #86efac;}

/* ── モーダル（問題詳細） ── */
.modal-mask{display:none;position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.5);overflow-y:auto;padding:16px;align-items:flex-start;justify-content:center;}
.modal-mask.on{display:flex;animation:min .2s ease;}
@keyframes min{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--card);border-radius:20px;max-width:500px;width:100%;margin:auto;overflow:hidden;box-shadow:0 16px 60px rgba(0,0,0,.25);animation:mbox .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes mbox{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.modal-imgs{display:flex;gap:0;overflow-x:auto;}
.modal-imgs::-webkit-scrollbar{display:none;}
.modal-img-item{flex-shrink:0;width:100%;}
.modal-img-item.multi{width:85%;}
.modal-img-item img{width:100%;max-height:240px;object-fit:cover;display:block;}
.modal-no-img{height:8px;background:linear-gradient(90deg,var(--or),var(--yw));}
.modal-content{padding:16px 16px 18px;}
.modal-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.modal-no{width:38px;height:38px;border-radius:10px;background:var(--or);border:2px solid var(--ordk);display:grid;place-items:center;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:#fff;flex-shrink:0;}
.modal-title{font-size:16px;font-weight:900;color:var(--ink);flex:1;line-height:1.3;}
.modal-close{background:#f3e8d8;border:none;border-radius:99px;padding:6px 14px;font-size:12px;color:var(--muted);cursor:pointer;font-family:'Noto Sans JP',sans-serif;flex-shrink:0;}
/* 家族向け煽り文・ストーリー */
.modal-hook{font-size:12px;font-weight:700;color:var(--pu);margin-bottom:4px;}
.modal-story{font-size:11px;color:#aaa;font-style:italic;margin-bottom:10px;}
.modal-q{font-size:15px;font-weight:700;line-height:1.85;color:var(--ink);margin-bottom:14px;}
/* 回答エリア */
.ans-row{display:flex;gap:8px;margin-bottom:9px;}
.ans-inp{flex:1;border:2px solid var(--bd);border-radius:99px;padding:11px 16px;font-size:16px;outline:none;font-family:'Noto Sans JP',sans-serif;background:var(--orlt);transition:border-color .2s;}
.ans-inp:focus{border-color:var(--or);}
.ans-btn{background:var(--or);color:#fff;border:none;border-radius:99px;padding:11px 22px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;}
.ans-btn:hover{background:var(--ordk);}
.ans-fb{padding:10px 14px;border-radius:11px;margin-bottom:9px;font-size:13px;font-weight:700;display:none;line-height:1.6;}
.ans-fb.ok{display:block;background:var(--gnlt);color:#15803d;border:1.5px solid #86efac;}
.ans-fb.ng{display:block;background:var(--ywlt);color:#92400e;border:1.5px solid #fde68a;}
/* ヒント */
.hint-btn{display:inline-flex;align-items:center;gap:6px;background:var(--ywlt);border:1.5px solid #fde68a;border-radius:99px;padding:7px 15px;font-size:12px;font-weight:700;color:#92400e;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.hint-btn:hover{background:#fef08a;}
.hint-cnt{background:var(--yw);color:#78350f;border-radius:99px;padding:1px 8px;font-size:9px;font-weight:900;}
.hint-item{display:none;margin-top:8px;padding:10px 13px;background:var(--ywlt);border-left:3px solid var(--yw);border-radius:0 10px 10px 0;font-size:13px;line-height:1.7;}
.hint-item.show{display:block;}
.hint-himg{margin-top:7px;border-radius:8px;overflow:hidden;}
.hint-himg img{width:100%;max-height:150px;object-fit:cover;display:block;}
.solved-msg{text-align:center;padding:14px 0 8px;font-size:20px;font-weight:900;color:var(--gn);}
.next-guide{background:var(--pult);border-left:3px solid var(--pu);border-radius:0 10px 10px 0;padding:10px 13px;margin-top:10px;font-size:12px;font-weight:700;color:#5b21b6;line-height:1.6;}

/* ══ タブ③：クリア特典 ══ */
.rewards-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.rcard{background:var(--card);border-radius:16px;border:2px solid var(--bd);padding:14px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.04);transition:all .25s;}
.rcard.open{border-color:var(--yw);background:var(--ywlt);box-shadow:0 4px 16px rgba(251,191,36,.18);}
.rcard.almost{background:#fff7ed;border-left:3px solid #fb923c;}
.rico{width:48px;height:48px;border-radius:12px;flex-shrink:0;background:var(--orlt);border:1.5px solid var(--orbd);display:flex;align-items:center;justify-content:center;font-size:24px;}
.rcard.open .rico{background:var(--ywlt);border-color:#fde68a;}
.rname{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:3px;}
.rcond{font-size:11px;color:var(--muted);}
.ralmost{font-size:10px;font-weight:700;color:var(--ordk);background:var(--orlt);border:1px solid var(--orbd);border-radius:99px;padding:2px 8px;display:inline-block;margin-top:3px;}
.rlock{font-size:22px;margin-left:auto;flex-shrink:0;}

/* ══ タブ④：注意事項 ══ */
.caution{background:var(--card);border-radius:16px;border:1.5px solid var(--bd);padding:14px 16px;}
.caution-title{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;}
.caution-body{font-size:11px;color:#888;line-height:2;white-space:pre-wrap;}

/* ══ 下部タブナビゲーション ══ */
.tab-nav{position:fixed;bottom:0;left:0;right:0;z-index:500;background:var(--card);border-top:2px solid var(--bd);display:flex;box-shadow:0 -4px 20px rgba(0,0,0,.08);}
.tab-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;cursor:pointer;transition:all .15s;border:none;background:none;font-family:'Noto Sans JP',sans-serif;-webkit-tap-highlight-color:transparent;}
.tab-nav-icon{font-size:20px;margin-bottom:3px;transition:transform .2s;}
.tab-nav-label{font-size:9px;font-weight:700;color:#bbb;letter-spacing:.03em;}
.tab-nav-item.active .tab-nav-icon{transform:scale(1.15);}
.tab-nav-item.active .tab-nav-label{color:var(--or);}

/* ══ 達成演出 ══ */
.ach-ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:900;pointer-events:none;}
.ach-ov.on{display:block;}
.ach-box{position:absolute;top:60px;left:50%;transform:translateX(-50%) translateY(-120px);background:#fff;border-radius:20px;padding:20px 28px 16px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.18);min-width:240px;max-width:300px;border-top:4px solid var(--gn);transition:transform .45s cubic-bezier(.34,1.56,.64,1);pointer-events:auto;}
.ach-ov.on .ach-box{transform:translateX(-50%) translateY(0);}
.ach-emoji{font-size:48px;display:block;margin-bottom:6px;animation:wig .5s ease;}
@keyframes wig{0%{transform:rotate(-15deg) scale(.8);}40%{transform:rotate(10deg) scale(1.2);}70%{transform:rotate(-5deg) scale(1.05);}100%{transform:rotate(0) scale(1);}}
.ach-praise{font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;color:#15803d;margin-bottom:4px;}
.ach-sub{font-size:12px;color:#666;line-height:1.6;}
.ach-rem{display:inline-block;margin-top:8px;font-size:13px;font-weight:900;color:var(--or);background:var(--orlt);border:1.5px solid var(--orbd);border-radius:99px;padding:4px 16px;}

/* ══ 全問正解ポップアップ ══ */
.pop-mask{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px;}
.pop-mask.on{display:flex;}
.pop-box{background:#fff;border-radius:24px;max-width:360px;width:100%;padding:28px 24px 22px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:popin .45s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden;}
@keyframes popin{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}
.pop-box::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--or),var(--yw),var(--gn));}
.pop-fire{font-size:56px;display:block;animation:float .9s ease-in-out infinite alternate;}
@keyframes float{from{transform:translateY(0);}to{transform:translateY(-8px);}}
.pop-title{font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;color:#222;margin:8px 0 5px;line-height:1.2;}
.pop-msg{font-size:13px;color:#666;line-height:1.7;margin-bottom:16px;}
.pop-reward{background:var(--orlt);border:2px solid var(--orbd);border-radius:13px;padding:14px;margin-bottom:16px;}
.pop-rlbl{font-size:10px;font-weight:700;color:var(--ordk);letter-spacing:.06em;margin-bottom:5px;}
.pop-rname{font-size:18px;font-weight:900;color:#222;}
.pop-rdesc{font-size:12px;color:#666;margin-top:4px;line-height:1.6;}
.pop-close{background:var(--or);color:#fff;border:none;border-radius:99px;padding:12px 36px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.pop-close:hover{background:var(--ordk);}

/* 紙吹雪 */
.cf-wrap{position:fixed;inset:0;pointer-events:none;z-index:998;overflow:hidden;}
.cf{position:absolute;border-radius:2px;animation:cfall linear forwards;}
@keyframes cfall{0%{opacity:1;transform:translateY(-10px) rotate(0);}100%{opacity:0;transform:translateY(110vh) rotate(540deg);}}

/* トースト */
.toast-wrap{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);z-index:700;display:flex;flex-direction:column-reverse;gap:7px;pointer-events:none;}
.toast{background:rgba(50,30,10,.9);color:#fff;border-radius:99px;padding:9px 22px;font-size:12px;font-weight:700;white-space:nowrap;animation:tin .3s ease;}
.toast.err{background:rgba(180,50,50,.9);}
@keyframes tin{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>

<!-- 達成演出 -->
<div class="ach-ov" id="ach-ov">
  <div class="ach-box">
    <span class="ach-emoji" id="ach-emoji">⭐</span>
    <div class="ach-praise" id="ach-praise">やったね！</div>
    <div class="ach-sub">スタンプをゲット！</div>
    <div class="ach-rem" id="ach-rem">あと4問！</div>
  </div>
</div>

<!-- 全問正解ポップアップ -->
<div class="pop-mask" id="pop-mask">
  <div class="pop-box">
    <span class="pop-fire">🎉</span>
    <div class="pop-title">全問正解！<br>おめでとう！</div>
    <div class="pop-msg">すべてのスタンプを集めました！<br>以下の特典を受け取ってください。</div>
    <div class="pop-reward">
      <div class="pop-rlbl">🏆 クリア特典</div>
      <div class="pop-rname" id="pr-name">限定グッズ</div>
      <div class="pop-rdesc" id="pr-desc">受付スタッフにこの画面をお見せください。</div>
    </div>
    <button class="pop-close" onclick="closePop()">とじる</button>
  </div>
</div>

<!-- 問題モーダル -->
<div class="modal-mask" id="modal-mask">
  <div class="modal-box">
    <div id="modal-imgs-area"></div>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<script>
var CAUTION_DEFAULT="■ スタンプラリー参加にあたっての注意事項\n\n【参加方法】\n・各スポットのパネルを見つけてください。\n・正解を入力するとスタンプを獲得できます。\n・間違えても何度でも挑戦できます。\n\n【スマートフォンについて】\n・歩きスマホは危険です。立ち止まってご使用ください。\n・スタンプデータはこのブラウザに保存されます。\n\n【特典交換】\n・受付スタッフにこの画面をご提示ください。\n\n【その他】\n・主催：（主催者名）　お問い合わせ：（連絡先）\n・荒天時は中止の場合があります。";
var PRAISES=["やったね！🎉","すごい！✨","天才！🌟","正解！👏","ブラボー！🎊","かしこい！💡"];
var GAS_URL='https://script.google.com/macros/s/AKfycbzJ9f9c9g9iKWmYq1kz3NyCDE-NWatx1rTuKVuE8YYhpwf8jy23Y3sFVKKSAdT6K9koIg/exec';

var quizData=[
  {id:1,no:1,title:"公園の謎①",hook:"🧒 子どもへ：パネルをよーく見てね！",story:"冒険のスタート！まず噴水のひみつを解き明かせ！",desc:"ヒントをもとに答えを探そう！",q:"久屋大通り公園にある噴水は何の形をしているでしょう？\n\nパネルをよく見て考えてみてね！",ans:"たい",sType:"emoji",sEmoji:"🐟",sImg:null,images:[],hints:[{text:"水の中に住む生き物です",img:null},{text:"よく食べられる魚です",img:null}],nextGuide:"🗺 噴水の近くに花がたくさん咲いているよ。次はそこへGO！",status:"published"},
  {id:2,no:2,title:"花の謎②",hook:"👨 パパ・ママへ：お子さんと一緒に考えてみて！",story:"次は公園に咲く花のなまえだ！",desc:"春に咲く花の名前を当てよう",q:"春になると公園に咲くこの花の名前は何でしょう？",ans:"さくら",sType:"emoji",sEmoji:"🌸",sImg:null,images:[],hints:[{text:"春の日本の花といえばこれ！",img:null}],nextGuide:"🗺 次は近くにある高〜いタワーを探してみよう！",status:"published"},
  {id:3,no:3,title:"建物の謎③",hook:"👴 おじいちゃん・おばあちゃんへ：昔のことを教えてあげて！",story:"次は高い建物のなまえだ！",desc:"近くにある有名なタワーは？",q:"公園の近くにある高いタワーの名前は？（ひらがなで）",ans:"てれびとう",sType:"emoji",sEmoji:"📡",sImg:null,images:[],hints:[{text:"テレビの電波を送る建物です",img:null}],nextGuide:"🗺 次はこの公園の名前のひみつに迫れ！",status:"published"},
  {id:4,no:4,title:"歴史の謎④",hook:"👨‍👩‍👧 家族みんなで相談してみよう！",story:"公園の名前のよみかたを調べよう！",desc:"公園の名前の読み方は？",q:"この公園の「久屋」という読み方は？",ans:"ひさや",sType:"emoji",sEmoji:"🏛️",sImg:null,images:[],hints:[{text:"漢字の読み方をじっくり考えてみよう",img:null}],nextGuide:"🗺 ラスト1問！これまでの謎の答えを全部思い出して！",status:"published"},
  {id:5,no:5,title:"最終謎⑤",hook:"🌟 ラスト！家族全員の力を合わせて！",story:"ついに最終謎！",desc:"全ての謎の答えをつなげると？",q:"謎①〜④の答えの頭文字をつなげると何になる？",ans:"たさてひ",sType:"emoji",sEmoji:"🔑",sImg:null,images:[],hints:[{text:"4文字の言葉です",img:null}],nextGuide:"",status:"published"}
];
var rewardData=[
  {id:1,name:"オリジナルステッカー",ico:"🎴",req:3,desc:"受付スタッフにお声がけください",allClear:false},
  {id:2,name:"全問クリア！限定グッズ",ico:"🏆",req:5,desc:"全問正解のみ！受付スタッフにこの画面をお見せください",allClear:true}
];
var S={stamps:[],hintUsed:{},hintLevel:{}};
var othProg=[3,3,2,1,0],othTotal=6;
var currentTab='home';

/* ── GAS ── */
function gasGet(){return fetch(GAS_URL+'?action=all').then(function(r){return r.json();}).catch(function(){return null;});}

/* ── 初期化 ── */
window.addEventListener("DOMContentLoaded",function(){
  try{var q=JSON.parse(localStorage.getItem("nazo_quiz"));if(q&&q.length)quizData=q;}catch(e){}
  try{var r=JSON.parse(localStorage.getItem("nazo_rewards"));if(r&&r.length)rewardData=r;}catch(e){}
  applyEvent(JSON.parse(localStorage.getItem("nazo_event")||"{}"));
  renderAll();
  gasGet().then(function(data){
    if(!data)return;
    if(data.quiz&&data.quiz.length){quizData=data.quiz;localStorage.setItem("nazo_quiz",JSON.stringify(quizData));}
    if(data.rewards&&data.rewards.length){rewardData=data.rewards;localStorage.setItem("nazo_rewards",JSON.stringify(rewardData));}
    if(data.event&&Object.keys(data.event).length){localStorage.setItem("nazo_event",JSON.stringify(data.event));applyEvent(data.event);}
    renderAll();
  });
  setInterval(function(){
    for(var i=0;i<othProg.length;i++){if(Math.random()<.15&&othProg[i]<othTotal)othProg[i]++;}
    renderQStat();
  },10000);
  window.addEventListener("storage",function(){
    try{var q2=JSON.parse(localStorage.getItem("nazo_quiz"));if(q2&&q2.length)quizData=q2;}catch(e){}
    try{var r2=JSON.parse(localStorage.getItem("nazo_rewards"));if(r2&&r2.length)rewardData=r2;}catch(e){}
    try{applyEvent(JSON.parse(localStorage.getItem("nazo_event")||"{}"));}catch(e){}
    renderAll();
  });
});

function pub(){return quizData.filter(function(q){return q.status!=="hidden";});}
function renderAll(){renderQStat();renderStamps();renderBanner();renderSpots();renderRewards();}

function applyEvent(ev){
  if(!ev)return;
  try{
    if(ev.name)document.getElementById("ev-title").textContent=ev.name;
    if(ev.sub)document.getElementById("ev-sub").textContent=ev.sub;
    if(ev.logo)document.getElementById("hdr-logo").innerHTML='<img src="'+ev.logo+'">';
    if(ev.heroImg){var hi=document.getElementById("hero-img");hi.src=ev.heroImg;hi.style.display="block";}
    if(ev.spotLabel){
      document.getElementById("spots-label").textContent=ev.spotLabel;
      document.getElementById("nav-spots-label").textContent=ev.spotLabel;
    }
    document.getElementById("caution-body").textContent=(ev.cautionMode==="custom"&&ev.customCaution)?ev.customCaution:CAUTION_DEFAULT;
  }catch(e){}
}

/* ── タブ切替 ── */
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll(".tab-content").forEach(function(el){el.classList.remove("active");});
  document.querySelectorAll(".tab-nav-item").forEach(function(el){el.classList.remove("active");});
  document.getElementById("tab-"+tab).classList.add("active");
  document.getElementById("nav-"+tab).classList.add("active");
}

/* ── みんなの正解状況 ── */
function renderQStat(){
  var qs=pub(),h="";
  for(var i=0;i<qs.length;i++){
    var q=qs[i];
    var cnt=(othProg[i]||0)+((S.stamps.indexOf(q.id)!==-1)?1:0);
    var pct=Math.round(cnt/(othTotal+1)*100);
    h+='<div class="qrow"><div class="qlbl">Q'+q.no+'</div>'
      +'<div class="qbar"><div class="qfill" style="width:'+pct+'%"></div></div>'
      +'<div class="qnum">'+cnt+'人('+pct+'%)</div></div>';
  }
  document.getElementById("qstat").innerHTML=h;
}

/* ── スタンプボード ── */
function renderStamps(){
  var qs=pub(),t=qs.length||1,e=S.stamps.length;
  document.getElementById("scount").innerHTML=e+'<small>個</small>';
  document.getElementById("prog-fill").style.width=Math.round(e/t*100)+"%";
  var h="";
  for(var i=0;i<qs.length;i++){
    var q=qs[i],earned=(S.stamps.indexOf(q.id)!==-1);
    var inner='<span class="sno">'+q.no+'</span>';
    if(earned){
      if(q.sType==="image"&&q.sImg)inner+='<div class="simg"><img src="'+q.sImg+'" alt=""></div>';
      else inner+='<span class="semoji">'+(q.sEmoji||"⭐")+'</span>';
      inner+='<span class="slbl">'+q.title.replace(/の謎|のクイズ/g,"").slice(0,5)+'</span>';
    }else inner+='<span class="sempty">?</span>';
    h+='<div class="scell'+(earned?" on":"")+'" id="sc-'+q.id+'"><div class="scell-in">'+inner+'</div></div>';
  }
  document.getElementById("sgrid").innerHTML=h;
}

/* ── あとN問バナー ── */
function renderBanner(){
  var qs=pub(),t=qs.length||1,e=S.stamps.length,rem=t-e;
  var b=document.getElementById("rbanner");
  b.className="rbanner";
  var icon=document.getElementById("rb-icon"),main=document.getElementById("rb-main"),sub=document.getElementById("rb-sub");
  if(e===0){b.classList.add("many");icon.textContent="🗺";main.textContent="さあ、謎解きのはじまり！";sub.textContent="スタンプを全部集めよう！";}
  else if(rem>2){b.classList.add("many");icon.textContent="🔥";main.textContent="いい調子！あと"+rem+"問で完成！";sub.textContent="全問クリアで特典がもらえるよ";}
  else if(rem===2){b.classList.add("few");icon.textContent="✨";main.textContent="あと2問！もうすぐコンプリート！";sub.textContent="ラストスパート！家族で力を合わせて！";}
  else if(rem===1){b.classList.add("last");icon.textContent="🏁";main.textContent="あと1問！ゴールはすぐそこ！！";sub.textContent="最後の謎を解いて特典をもらおう！";}
  else{b.classList.add("done");icon.textContent="🎊";main.textContent="全問コンプリート！";sub.textContent="すごい！特典を受け取ってね！";}
}

/* ── ★ スポット一覧（2列グリッド） ── */
function renderSpots(){
  var qs=pub(),h="",sc=0;
  for(var ci=0;ci<qs.length;ci++){if(S.stamps.indexOf(qs[ci].id)!==-1)sc++;}
  var sb=document.getElementById("spots-badge");if(sb)sb.textContent=sc+"/"+qs.length+"クリア";
  for(var i=0;i<qs.length;i++){
    var q=qs[i],solved=(S.stamps.indexOf(q.id)!==-1);
    var imgs=(q.images||[]).filter(function(im){return im&&im.url;});
    var thumbH=(imgs.length>0)?'<img src="'+imgs[0].url+'" alt="'+q.title+'">'
              :(q.sEmoji||"❓");
    h+='<div class="spot-card'+(solved?" solved":"")+'" onclick="openSpot('+q.id+')">'
      +'<div class="spot-thumb">'
        +thumbH
        +'<div class="spot-no-badge">Q'+q.no+'</div>'
        +'<div class="spot-solved-overlay"><span class="spot-solved-mark">✅</span></div>'
      +'</div>'
      +'<div class="spot-info">'
        +'<div class="spot-title">'+q.title+'</div>'
        +(q.desc?'<div class="spot-desc">'+q.desc+'</div>':'')
        +'<div class="spot-status '+(solved?'done':'todo')+'">'+(solved?'✅ 正解！':'挑戦する')+'</div>'
      +'</div>'
      +'</div>';
  }
  document.getElementById("spots-grid").innerHTML=h;
}

/* ── 問題モーダル ── */
function openSpot(id){
  var q=null;for(var i=0;i<quizData.length;i++){if(quizData[i].id===id){q=quizData[i];break;}}
  if(!q)return;
  var solved=(S.stamps.indexOf(id)!==-1);
  var hn=S.hintUsed[id]||0;
  var imgs=(q.images||[]).filter(function(im){return im&&im.url;});

  /* 画像エリア */
  var imgHtml='';
  if(imgs.length>0){
    imgHtml='<div class="modal-imgs">';
    for(var j=0;j<imgs.length;j++)
      imgHtml+='<div class="modal-img-item'+(imgs.length>1?" multi":"")+'"><img src="'+imgs[j].url+'" alt=""></div>';
    imgHtml+='</div>';
  }else{
    imgHtml='<div class="modal-no-img"></div>';
  }
  document.getElementById("modal-imgs-area").innerHTML=imgHtml;

  /* ヒント */
  var hints=q.hints||[],hintH="";
  for(var k=0;k<hints.length;k++){
    var hh=hints[k],ht=(typeof hh==="string")?hh:(hh.text||"");
    var himg=(typeof hh==="object"&&hh.img)?'<div class="hint-himg"><img src="'+hh.img+'" alt=""></div>':"";
    hintH+='<div class="hint-item'+((S.hintLevel[id]||0)>k?" show":"")+'">'+ht+himg+'</div>';
  }

  /* コンテンツ */
  var content='<div class="modal-hdr">'
    +'<div class="modal-no">'+q.no+'</div>'
    +'<div class="modal-title">'+q.title+'</div>'
    +'<button class="modal-close" onclick="closeModal()">とじる</button>'
    +'</div>';
  if(q.hook)content+='<div class="modal-hook">'+q.hook+'</div>';
  if(q.story&&!solved)content+='<div class="modal-story">📖 '+q.story+'</div>';
  content+='<div class="modal-q">'+(q.q||"").replace(/\n/g,"<br>")+'</div>';

  if(solved){
    content+='<div class="solved-msg">'+(q.sEmoji||"✓")+" 正解！スタンプゲット！</div>";
    if(q.nextGuide)content+='<div class="next-guide">'+q.nextGuide+'</div>';
  }else{
    content+='<div class="ans-row">'
      +'<input class="ans-inp" id="minp" placeholder="こたえを入力…" maxlength="40" onkeydown="if(event.key===\'Enter\')doAns('+id+')">'
      +'<button class="ans-btn" onclick="doAns('+id+')">送信</button>'
      +'</div>'
      +'<div class="ans-fb" id="mfb"></div>'
      +'<button class="hint-btn" onclick="doHint('+id+')">💡 ヒントを見る <span class="hint-cnt">'+hn+'</span></button>'
      +hintH;
  }

  document.getElementById("modal-content").innerHTML=content;
  document.getElementById("modal-mask").classList.add("on");
  document.getElementById("modal-mask").onclick=function(e){if(e.target===this)closeModal();};
}
function closeModal(){document.getElementById("modal-mask").classList.remove("on");}

/* ── 回答 ── */
function norm(s){return s.trim().toLowerCase().replace(/[Ａ-Ｚａ-ｚ０-９]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0xFEE0);}).replace(/\s/g,"");}
function doAns(id){
  var inp=document.getElementById("minp"),fb=document.getElementById("mfb");
  var q=null;for(var i=0;i<quizData.length;i++){if(quizData[i].id===id){q=quizData[i];break;}}
  if(!q||!inp||!norm(inp.value))return;
  if(norm(inp.value)===norm(q.ans)){
    fb.textContent="🎉 せいかい！スタンプをゲットしました！";fb.className="ans-fb ok";
    S.stamps.push(id);showAch(q);
    var qs=pub(),allOK=true;
    for(var j=0;j<qs.length;j++){if(S.stamps.indexOf(qs[j].id)===-1){allOK=false;break;}}
    setTimeout(function(){closeModal();renderAll();if(allOK)showPop();},900);
  }else{
    var ngs=["おしい！もう一度考えてみよう💪","ちがうかも！ヒントを使ってみて😊","惜しい！家族で相談してみよう！","もう少し！パネルをもう一度見てみよう👀"];
    fb.textContent=ngs[Math.floor(Math.random()*ngs.length)];fb.className="ans-fb ng";inp.value="";inp.focus();
  }
}
function doHint(id){
  var q=null;for(var i=0;i<quizData.length;i++){if(quizData[i].id===id){q=quizData[i];break;}}
  if(!q)return;var cur=S.hintLevel[id]||0;
  if(cur>=(q.hints||[]).length){toast("これ以上ヒントはありません",true);return;}
  S.hintUsed[id]=(S.hintUsed[id]||0)+1;S.hintLevel[id]=cur+1;
  openSpot(id);toast("ヒント"+(cur+1)+"を表示！");
}

/* ── 達成演出 ── */
function showAch(q){
  var qs=pub(),rem=qs.length-S.stamps.length;
  document.getElementById("ach-emoji").textContent=q.sEmoji||"⭐";
  document.getElementById("ach-praise").textContent=PRAISES[Math.floor(Math.random()*PRAISES.length)];
  document.getElementById("ach-rem").textContent=rem>0?"あと"+rem+"問でコンプリート！":"全部コンプリート！🎊";
  var ov=document.getElementById("ach-ov");ov.classList.add("on");
  setTimeout(function(){ov.classList.remove("on");},2400);
}

/* ── 全問正解 ── */
function showPop(){
  var best=null;
  for(var i=0;i<rewardData.length;i++){if(rewardData[i].allClear){best=rewardData[i];break;}}
  if(!best&&rewardData.length){best=rewardData[0];for(var j=0;j<rewardData.length;j++){if(rewardData[j].req>best.req)best=rewardData[j];}}
  if(best){document.getElementById("pr-name").textContent=best.name;document.getElementById("pr-desc").textContent=best.desc||"受付スタッフにこの画面をお見せください。";}
  document.getElementById("pop-mask").classList.add("on");confetti();
}
function closePop(){document.getElementById("pop-mask").classList.remove("on");}
function confetti(){
  var colors=["#f97316","#fbbf24","#22c55e","#3b82f6","#a855f7","#ec4899"],wrap=document.getElementById("cf-wrap");
  for(var i=0;i<70;i++){(function(idx){setTimeout(function(){
    var el=document.createElement("div");el.className="cf";
    el.style.left=Math.random()*100+"vw";el.style.background=colors[Math.floor(Math.random()*colors.length)];
    var s=(Math.random()*8+5)+"px";el.style.width=s;el.style.height=s;
    el.style.borderRadius=Math.random()>.5?"50%":"2px";el.style.animationDuration=(Math.random()*2+2)+"s";
    wrap.appendChild(el);setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},4200);
  },idx*40);})(i);}
}

/* ── 特典 ── */
function renderRewards(){
  var e=S.stamps.length,h="";
  for(var i=0;i<rewardData.length;i++){
    var r=rewardData[i],u=(e>=r.req),lack=r.req-e,almost=(!u&&lack<=2);
    h+='<div class="rcard'+(u?" open":(almost?" almost":""))+'"><div class="rico">'+r.ico+'</div>'
      +'<div style="flex:1"><div class="rname">'+r.name+'</div><div class="rcond">スタンプ'+r.req+'個で解放（現在'+e+'個）</div>'
      +(almost?'<div class="ralmost">あと'+lack+'個で解放！🎯</div>':"")
      +'</div><div class="rlock">'+(u?"🔓":"🔒")+'</div></div>';
  }
  document.getElementById("rewards-list").innerHTML=h;
}

/* ── ニックネーム ── */
function setNick(){
  var n=document.getElementById("nick-inp").value.trim();
  if(!n){toast("ニックネームを入力してください",true);return;}
  document.getElementById("nform").style.display="none";
  document.getElementById("nshow").classList.add("on");
  document.getElementById("nname").textContent=n;
  document.getElementById("navatar").textContent=n.charAt(0);
  toast(n+"さん、レッツゴー！🎉");
}
function resetNick(){
  document.getElementById("nform").style.display="flex";
  document.getElementById("nshow").classList.remove("on");
}

/* ── トースト ── */
function toast(msg,err){
  var w=document.getElementById("toast-wrap"),t=document.createElement("div");
  t.className="toast"+(err?" err":"");t.textContent=msg;w.appendChild(t);
  setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},2600);
}
</script>
